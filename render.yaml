# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo: Dashboard → Blueprints → New Blueprint Instance (or add Web Service manually using same settings).

services:
  - type: web
    name: hippocare-hospital-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
